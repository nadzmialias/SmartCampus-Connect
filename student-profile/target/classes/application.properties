# Server Port (Must be different for each service)
server.port=8081

# Database Connection (Ensure campus_student_db is created in phpMyAdmin)
spring.datasource.url=jdbc:mysql://localhost:3306/campus_student_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration for backward compatibility
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true